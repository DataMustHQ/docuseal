name: Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]  # change if your deploy branch is different
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # optional: only deploy if CI passed if you wire workflow_run instead
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to ACA
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.AZURE_ACR_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APP_ENV_NAME }}
          dockerfilePath: ./Dockerfile
          imageToBuild: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/docuseal:${{ github.sha }}